name: CI/CD (artifacts)

on:
  push:
    branches: [main]
    tags: [v*]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  extract-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Extract version
        id: extract
        uses: aerospike/shared-workflows/.github/actions/extract-version-from-tag@7f633569d89f706899e6b8f2151a3b200576c1fd # v3.1.1

  cicd:
    needs: extract-version
    uses: aerospike/shared-workflows/.github/workflows/reusable_artifacts-cicd.yaml@7f633569d89f706899e6b8f2151a3b200576c1fd # v3.1.1
    with:
      gh-workflows-ref: 7f633569d89f706899e6b8f2151a3b200576c1fd # v3.1.1
      jf-project: test
      jf-build-name: test-build
      version: ${{ needs.extract-version.outputs.version }}
      gh-artifact-directory: dist
      oidc-provider-name: gh-dev-test
      oidc-audience: aerospike/testing
      dry-run: ${{ github.event_name == 'pull_request' }}
      build-script: |
        set -euo pipefail
        echo "Building version: ${{ needs.extract-version.outputs.version }}"
        mkdir -p dist
        echo "hello-world" > dist/hello-world.txt
    secrets:
      gpg-private-key: ${{ secrets.GPG_SECRET_KEY }}
      gpg-public-key: ${{ secrets.GPG_PUBLIC_KEY }}
      gpg-key-pass: ${{ secrets.GPG_PASS }}
