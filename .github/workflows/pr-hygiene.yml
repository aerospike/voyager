name: PR Hygiene - Jira Ticket in Title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read

jobs:
  validate-jira-ticket:
    uses: aerospike/shared-workflows/.github/workflows/reusable_pr-hygiene.yml@8f53b63b33d86e63aeb37d951283dd974574885b # v3.2.0
    with:
      pr_title: ${{ github.event.pull_request.title }}
